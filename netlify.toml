# Netlify config — deploys the static prototype as-is (no build step).
# The prototype is in-browser React + Babel-standalone (CDN), so there is
# nothing to compile; we just publish the prototype/ folder.

[build]
  publish = "prototype"
  command = ""

# Serverless functions (personal-state sync via Netlify Blobs). Netlify installs
# the function deps (package.json) and bundles with esbuild on deploy.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA-style: the app is a single index.html (client-side screens via state),
# so route any unknown path back to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Never let the browser cache the HTML shell — always revalidate so a new deploy
# (with bumped ?v= script tags) shows up on a normal reload, no hard-refresh needed.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
