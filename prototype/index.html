  .t6-wf-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11.5px; font-weight: 500; color: var(--accent-2); background: transparent; border: 0; padding: 0; cursor: pointer; }
  .t6-wf-link:hover, .t6-wf-link.on { text-decoration: underline; }
  .t6-wf-scrim { position: fixed; inset: 0; z-index: 60; }
  .t6-wf-pop { position: absolute; bottom: 100%; right: 0; margin-bottom: 8px; z-index: 61; width: 380px; max-width: 86vw; background: var(--card); border: 1px solid var(--line-strong); border-radius: var(--r-2); box-shadow: 0 14px 40px rgba(0,0,0,.16); padding: 14px 16px; text-align: left; cursor: default; }
  .t6-wf-head { font-size: 12px; font-weight: 600; color: var(--ink); display: flex; flex-wrap: wrap; gap: 6px; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .t6-wf-sc { font-size: 10.5px; font-weight: 500; color: var(--accent-2); background: var(--accent-tint); border-radius: 999px; padding: 2px 8px; font-family: var(--mono); }
  .t6-wf-eg { font-size: 12.5px; line-height: 1.5; color: var(--ink-2); background: var(--card-2); border: 1px solid var(--line); border-radius: var(--r-1); padding: 8px 10px; margin: 0 0 10px; }
  .t6-wf-eg b { color: var(--ink); }
  .t6-wf-rules { margin: 0; padding-left: 16px; font-size: 12px; line-height: 1.55; color: var(--ink-3); }
  .t6-wf-rules b { color: var(--ink-2); }

  /* >10-min rule banner */
  .t6-rule-banner { display: flex; align-items: center; gap: 12px; background: var(--card-2); border: 1px solid var(--line-strong); border-radius: var(--r-2); padding: 10px 14px; margin-bottom: 12px; }
  .t6-rule-ic { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-tint); color: var(--accent-2); display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
  .t6-rule-title { font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .t6-rule-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 1px; }

  /* duration board */
  .t6-board { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; align-items: flex-start; }
  .t6-col { flex: 0 0 280px; background: var(--card-2); border: 1px solid var(--line); border-radius: var(--r-2); }
  .t6-col-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--line); }
  .t6-col-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .t6-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-1); padding: 10px 12px; cursor: pointer; transition: border-color .12s, box-shadow .12s; }
  .t6-card:hover { border-color: var(--line-strong); box-shadow: 0 1px 4px rgba(0,0,0,.05); }

  /* timer block in the task detail panel */
  .t6-timer { display: flex; align-items: center; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line-2); }

  /* team activity report */
  .t6-people { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; padding: 14px 16px; }
  .t6-person { background: var(--card-2); border: 1px solid var(--line); border-radius: var(--r-2); padding: 12px; }
  .t6-act-row { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px dashed var(--line-2); cursor: pointer; }
  .t6-act-row:hover { background: var(--card-2); }

  @media (max-width: 900px) {
    .t6-col { flex-basis: 240px; }
    .t6-qa-hint { display: none; }
    .t6-act-row span[style*="width: 120px"] { width: auto; }
  }

  /* compact Todoist-style New Task box */
  .t6-newtask { width: 600px; max-width: 92vw; max-height: calc(100vh - 56px); background: var(--card); border-radius: var(--r-3); box-shadow: 0 24px 70px rgba(0,0,0,.20); overflow: hidden; display: flex; flex-direction: column; }
  .t6-nt-body { padding: 18px 20px 10px; overflow-y: auto; flex: 1; min-height: 0; }
  .t6-nt-title { width: 100%; border: 0; outline: 0; background: transparent; font-family: var(--serif); font-size: 22px; font-weight: 500; letter-spacing: -.01em; color: var(--ink); padding: 2px 0; }
  .t6-nt-title::placeholder { color: var(--ink-4); font-weight: 500; }
  .t6-nt-desc { width: 100%; border: 0; outline: 0; background: transparent; font-family: var(--sans); font-size: 13.5px; color: var(--ink-2); padding: 6px 0 2px; }
  .t6-nt-desc::placeholder { color: var(--ink-4); }
  .t6-nt-x { margin-left: 6px; cursor: pointer; opacity: .55; font-size: 11px; }
  .t6-nt-x:hover { opacity: 1; }
  .t6-nt-fieldrow { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0 2px; align-items: center; }
  .t6-nt-chip { cursor: pointer; }
  .t6-nt-pill { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; border: 1px solid var(--line); background: var(--card); border-radius: 8px; padding: 6px 11px; cursor: pointer; color: var(--ink-2); transition: border-color .12s, background .12s; }
  .t6-nt-pill:hover { border-color: var(--line-strong); color: var(--ink); background: var(--card-2); }
  .t6-nt-pill.on { border-color: var(--accent); color: var(--accent-2); background: var(--accent-tint); }
  .t6-nt-pill.icon { width: 36px; height: 36px; padding: 0; justify-content: center; gap: 0; border-radius: 9px; }
  .t6-nt-pill.icon .t6-nt-pemoji { font-size: 16px; }
  .t6-nt-pemoji { font-size: 13px; line-height: 1; }
  .t6-nt-editor { margin-top: 12px; padding: 12px 14px; border: 1px solid var(--line); border-radius: var(--r-2); background: var(--card-2); }
  .t6-nt-foot { display: flex; align-items: center; gap: 10px; padding: 12px 20px; border-top: 1px solid var(--line); background: var(--card-2); }
  .t6-nt-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .t6-nt-eyebrow { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-4); }
  .t6-nt-ramble { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 500; border: 1px solid var(--line); background: var(--card); color: var(--accent-2); border-radius: 999px; padding: 4px 12px; cursor: pointer; }
  .t6-nt-ramble:hover, .t6-nt-ramble.on { border-color: var(--accent); background: var(--accent-tint); }
  .t6-ramble { padding-top: 2px; }
  .t6-ramble-ta { width: 100%; min-height: 130px; border: 1px solid var(--line); border-radius: var(--r-2); background: var(--card-2); padding: 12px 14px; font-family: var(--sans); font-size: 14px; line-height: 1.5; color: var(--ink); outline: 0; resize: vertical; }
  .t6-ramble-ta:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  .t6-ramble-ta::placeholder { color: var(--ink-4); }
  /* Text Scan — paragraph → many tasks preview */
  .t6-scan { padding-top: 2px; }
  .t6-scan-eyebrow { font-size: 11.5px; letter-spacing: .04em; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 8px; }
  .t6-scan-list { display: flex; flex-direction: column; gap: 6px; max-height: 320px; overflow-y: auto; }
  .t6-scan-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 10px; background: var(--card-2); }
  .t6-scan-item .check { margin-top: 1px; }
  .t6-scan-title { font-size: 13.5px; font-weight: 500; color: var(--ink); }
  .t6-scan-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .t6-scan-chips .pill { font-size: 11px; }
  /* floating widget-editor popover (opens up/down, sized to content) */
  .t6-fpop { z-index: 120; background: var(--card); border: 1px solid var(--line-strong); border-radius: 12px; box-shadow: 0 16px 44px rgba(27,23,20,.24); padding: 10px; min-width: 210px; max-width: 330px; max-height: min(62vh, 440px); overflow-y: auto; }
  .t6-fpop .input, .t6-fpop .select-input, .t6-fpop input, .t6-fpop select { width: 100%; }
  /* Todoist-style date editor: icon quick chips + Repeat */
  .t6-dateedit .t6-dq { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 8px; }
  .t6-dateedit .t6-dq button { display: inline-flex; align-items: center; gap: 7px; background: var(--card-2); border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; font-size: 12.5px; color: var(--ink-2); cursor: pointer; }
  .t6-dateedit .t6-dq button:hover { border-color: var(--accent); color: var(--accent); }
  .t6-dq-ic { font-size: 14px; line-height: 1; }
  .t6-dr-repeat { display: flex; align-items: center; width: 100%; margin-top: 8px; background: var(--card-2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 13px; color: var(--ink); cursor: pointer; }
  .t6-dr-repeat:hover { border-color: var(--accent); }
  .t6-dr-list { display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
  .t6-dr-list button { text-align: left; background: transparent; border: 0; padding: 8px 9px; border-radius: 7px; font-size: 13px; color: var(--ink); cursor: pointer; }
  .t6-dr-list button:hover { background: rgba(27,23,20,.05); }
  .t6-dr-list button.on { color: var(--accent); font-weight: 600; }
  @media (max-width: 640px) { .t6-newtask { width: 100vw; max-width: 100vw; } }

  /* ─── Phase 7 — Tasks workspace (two-pane: sub-sidebar + view) ─── */
  .t6-ws { display: flex; gap: 0; align-items: stretch; margin: -22px -26px -60px; min-height: calc(100vh - 56px); }
  .t6-sub { flex: 0 0 232px; background: var(--paper-2); border-right: 1px solid var(--line); padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .t6-sub-add { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; background: transparent; border: 0; color: var(--accent); font-weight: 600; font-size: 13.5px; padding: 7px 10px; cursor: pointer; border-radius: 8px; }
  .t6-sub-add:hover { background: rgba(197,85,45,.07); }
  .t6-sub-addic { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 999px; background: var(--accent); color: #fff; font-size: 15px; line-height: 1; }
  .t6-sub-search { display: flex; align-items: center; gap: 7px; background: var(--card); border: 1px solid var(--line); border-radius: 8px; padding: 6px 9px; margin: 6px 0 10px; }
  .t6-sub-search .icon { width: 14px; height: 14px; color: var(--ink-4); }
  .t6-sub-search input { border: 0; background: transparent; outline: 0; font-size: 13px; width: 100%; color: var(--ink); font-family: var(--sans); }
  .t6-sub-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; color: var(--ink-2); cursor: pointer; user-select: none; font-size: 13.5px; border: 1px solid transparent; }
  .t6-sub-item:hover { background: rgba(27,23,20,.04); }
  .t6-sub-item.active { background: var(--card); color: var(--ink); border-color: var(--line); box-shadow: var(--sh-1); }
  .t6-sub-item .icon { width: 16px; height: 16px; color: var(--ink-3); }
  .t6-sub-item.active .icon { color: var(--accent); }
  .t6-sub-item .count { margin-left: auto; font-size: 12.5px; color: var(--ink-4); background: rgba(27,23,20,.05); padding: 1px 6px; border-radius: 999px; }
  .t6-sub-item.active .count { background: var(--accent-tint); color: var(--accent-2); }
  .t6-sub-muted { color: var(--ink-4); }
  .t6-sub-title { font-size: 11.5px; text-transform: uppercase; letter-spacing: .12em; color: var(--ink-4); padding: 14px 10px 6px; font-weight: 500; }
  .t6-sub-dot { width: 9px; height: 9px; border-radius: 999px; flex: 0 0 9px; }
  .t6-sub-hash { width: 16px; text-align: center; font-weight: 700; font-size: 15px; flex: 0 0 16px; }
  .t6-sub-addrow input { width: 100%; border: 1px solid var(--accent); background: var(--card); border-radius: 8px; padding: 6px 10px; font-size: 13px; outline: 0; font-family: var(--sans); }
  .t6-ws-main { flex: 1; min-width: 0; display: flex; flex-direction: column; padding: 20px 26px 60px; overflow-x: hidden; }
  .t6-ws-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .t6-ws-title { font-family: var(--serif); font-size: 26px; font-weight: 500; color: var(--ink); margin: 0; }
  .seg.sm button { padding: 5px 9px; font-size: 12.5px; }
  .t6-ws-tools { display: flex; flex-direction: column; }
  .t6-ws-body { margin-top: 4px; }
  .t6-starthere { display: flex; align-items: center; gap: 14px; background: var(--ink); color: var(--paper); border-radius: var(--r-2); padding: 14px 18px; }
  .t6-starthere-ic { width: 30px; height: 30px; border-radius: 999px; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .t6-starthere-eyebrow { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: rgba(247,244,238,.6); }
  .t6-starthere-title { font-size: 16px; font-weight: 600; margin-top: 2px; }
  .t6-starthere .muted { color: rgba(247,244,238,.55) !important; }
  /* Start here — top-3 ranked suggestions */
  /* "Start here" — transparent container; each rank is its own tinted, colored chip */
  .t6-suggest { background: transparent; border-radius: var(--r-2); padding: 2px 0 4px; }
  .t6-suggest-head { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 9px; }
  .t6-suggest-eyebrow { font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .t6-suggest-head .muted { color: var(--ink-4) !important; }
  .t6-suggest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .t6-suggest-row { display: flex; align-items: flex-start; gap: 11px; padding: 11px 12px; border: 1px solid var(--line); border-left-width: 3px; border-radius: 12px; cursor: pointer; transition: box-shadow .12s, transform .08s; background: var(--card); min-height: 64px; }
  .t6-suggest-row:hover { box-shadow: 0 4px 14px rgba(27,23,20,.08); transform: translateY(-1px); }
  .t6-suggest-row.r1 { background: rgba(197,85,45,.07); border-left-color: var(--accent); }
  .t6-suggest-row.r2 { background: rgba(185,132,38,.09); border-left-color: #B98426; }
  .t6-suggest-row.r3 { background: rgba(78,111,174,.09); border-left-color: #4E6FAE; }
  .t6-suggest-rank { flex: 0 0 26px; width: 26px; height: 26px; border-radius: 999px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; font-family: var(--mono); color: #fff; }
  .t6-suggest-rank.r1 { background: var(--accent); }
  .t6-suggest-rank.r2 { background: #B98426; }
  .t6-suggest-rank.r3 { background: #4E6FAE; }
  .t6-suggest-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  @media (max-width: 1100px) { .t6-suggest-grid { grid-template-columns: 1fr; } }
  .t6-suggest-reasons { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .t6-suggest-reason { font-size: 11px; color: var(--ink-3); background: rgba(27,23,20,.05); border-radius: 999px; padding: 2px 8px; white-space: nowrap; }
  .t6-weekstrip { display: flex; gap: 8px; }
  .t6-weekday { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 4px; border: 1px solid var(--line); border-radius: var(--r-2); background: var(--card); position: relative; }
  .t6-weekday.on { border-color: var(--accent); background: var(--accent-tint); }
  .t6-weekday-dow { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-4); }
  .t6-weekday-num { font-size: 18px; font-weight: 600; color: var(--ink); font-family: var(--mono); }
  .t6-weekday-dot { width: 5px; height: 5px; border-radius: 999px; background: var(--accent); }
  .t6-connect { display: flex; align-items: center; gap: 10px; background: var(--card-2); border: 1px dashed var(--line-strong); border-radius: var(--r-2); padding: 12px 16px; font-size: 13px; color: var(--ink-2); }
  .t6-connect .ic { width: 18px; height: 18px; }
  .t6-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .t6-cal-dow { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-4); text-align: center; padding-bottom: 4px; }
  .t6-cal-cell { min-height: 84px; border: 1px solid var(--line); border-radius: var(--r-1); background: var(--card); padding: 5px 6px; display: flex; flex-direction: column; gap: 3px; }
  .t6-cal-cell.blank { background: transparent; border-color: transparent; }
  .t6-cal-cell.today { border-color: var(--accent); background: var(--accent-tint); }
  .t6-cal-num { font-size: 12px; font-family: var(--mono); color: var(--ink-3); }
  .t6-cal-tasks { display: flex; flex-direction: column; gap: 2px; }
  .t6-cal-task { font-size: 10.5px; line-height: 1.3; background: var(--accent-tint); color: var(--accent-2); border-radius: 4px; padding: 1px 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
  .t6-rep-row { display: flex; gap: 14px; flex-wrap: wrap; }
  .t6-rep-stat { flex: 1; min-width: 140px; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-2); padding: 16px 18px; }
  .t6-rep-num { font-size: 30px; font-weight: 600; color: var(--ink); }
  /* drag & drop on board columns (sections) */
  .t6-drag { cursor: grab; }
  .t6-drag:active { cursor: grabbing; }
  .t6-drag.dragging { opacity: .4; }
  .t6-drag.nodrag { cursor: default; }
  .t6-col-drop { border-color: var(--accent) !important; background: var(--accent-tint); }
  .t6-col-drop .t6-col-body { outline: 2px dashed var(--accent); outline-offset: -6px; border-radius: var(--r-1); min-height: 40px; }
  /* within-column reorder insertion indicator */
  .t6-drag { border-radius: var(--r-1); }
  .t6-drag.t6-drop-before { box-shadow: 0 -3px 0 -1px var(--accent); }
  .t6-drag.t6-drop-after { box-shadow: 0 3px 0 -1px var(--accent); }
  /* ─── enriched task cards + rows ─── */
  .t6-card { transition: border-color .12s, box-shadow .12s, transform .1s; }
  .t6-card:hover { border-color: var(--line-strong); box-shadow: var(--sh-1); transform: translateY(-1px); }
  .t6-card.prio-high { border-left: 3px solid var(--danger); }
  .t6-card.prio-med  { border-left: 3px solid var(--warn); }
  .t6-card.prio-low  { border-left: 3px solid var(--line-strong); }
  .t6-card.is-done { opacity: .55; }
  .t6-card-top { display: flex; align-items: flex-start; gap: 8px; }
  .t6-card-title { flex: 1; min-width: 0; font-size: 13.5px; line-height: 1.35; font-weight: 500; color: var(--ink); }
  .t6-card.is-done .t6-card-title { text-decoration: line-through; color: var(--ink-3); }
  .t6-card-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; align-items: center; }
  .t6-card-pills:empty { display: none; }
