<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PPC Guru — Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* paper / ink */
    --paper:        #F7F4EE;   /* warm off-white background */
    --paper-2:      #F1ECE3;   /* recessed (sidebar) */
    --card:         #FFFFFF;
    --card-2:       #FBF8F2;   /* tinted card surface */
    --ink:          #1B1714;   /* near-black */
    --ink-2:        #3A332C;
    --ink-3:        #6E665C;
    --ink-4:        #786F5E;   /* darkened from #A09689 -> ~4.5:1 on paper (WCAG AA) */
    --line:         #E6DFD2;
    --line-2:       #EFE9DD;
    --line-strong:  #D8CFBD;

    /* accent: burnt orange */
    --accent:       #C5552D;
    --accent-2:     #A8431F;
    --accent-tint:  #F6E4D7;
    --accent-tint-2:#EFD4C0;

    /* status */
    --ok:           #2F7A57;
    --ok-tint:      #E1EFE6;
    --warn:         #B98426;
    --warn-tint:    #F5EAD0;
    --danger:       #B0432E;
    --danger-tint:  #F2DACF;
    --client:       #4E6FAE;     /* "waiting on client" blue */
    --client-tint:  #DEE5F2;

    /* type */
    --serif: "Newsreader", Georgia, serif;
    --sans:  "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono:  "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    /* radii */
    --r-1: 6px;
    --r-2: 10px;
    --r-3: 14px;
    --r-4: 20px;

    /* shadow */
    --sh-1: 0 1px 0 rgba(27,23,20,.04), 0 1px 2px rgba(27,23,20,.04);
    --sh-2: 0 1px 0 rgba(27,23,20,.04), 0 6px 18px -8px rgba(27,23,20,.18);
    --sh-pop: 0 10px 30px -8px rgba(27,23,20,.22), 0 2px 6px rgba(27,23,20,.06);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  button { font-family: inherit; cursor: pointer; }
  input, textarea, select { font-family: inherit; }

  /* layout */
  .app {
    display: grid;
    grid-template-columns: 232px 1fr;
    min-height: 100vh;
  }
  .sidebar {
    background: var(--paper-2);
    border-right: 1px solid var(--line);
    padding: 18px 14px 24px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    display: flex;
    align-items: center;
    padding: 0 22px;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 30;
  }
  .content {
    padding: 22px 26px 60px;
    min-width: 0;
    flex: 1;
  }

  /* sidebar */
  .brand {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 8px 18px;
  }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--ink); color: var(--paper);
    display: grid; place-items: center;
    font-family: var(--serif); font-weight: 600;
    font-size: 17px;
    font-style: italic;
  }
  .brand-name {
    font-family: var(--serif);
    font-size: 17px; letter-spacing: -.01em;
    font-weight: 500;
  }
  .brand-name em { color: var(--accent); font-style: italic; }

  .nav-section {
    margin-top: 14px;
  }
  .nav-section-title {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-4);
    padding: 4px 10px 6px;
    font-weight: 500;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    color: var(--ink-2);
    cursor: pointer;
    user-select: none;
    font-size: 13.5px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: rgba(27,23,20,.04); }
  .nav-item.active {
    background: var(--card);
    color: var(--ink);
    border-color: var(--line);
    box-shadow: var(--sh-1);
  }
  .nav-item .icon {
    width: 16px; height: 16px;
    color: var(--ink-3);
  }
  .nav-item.active .icon { color: var(--accent); }
  .nav-item .count {
    margin-left: auto;
    font-size: 12.5px;
    color: var(--ink-4);
    font-variant-numeric: tabular-nums;
    background: rgba(27,23,20,.05);
    padding: 1px 6px;
    border-radius: 999px;
  }
  .nav-item.active .count { background: var(--accent-tint); color: var(--accent-2); }

  /* topbar */
  .breadcrumb {
    font-size: 13.5px;
    color: var(--ink-3);
    display: flex; align-items: center; gap: 8px;
  }
  .breadcrumb .crumb-main {
    color: var(--ink);
    font-weight: 500;
  }
  .topbar-search {
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--ink-4);
    font-size: 13.5px;
  }
  .topbar-search input {
    flex: 1;
    border: none; outline: none;
    background: transparent;
    color: var(--ink);
  }
  .topbar-right {
    display: flex; align-items: center; gap: 10px;
    margin-left: auto;
  }
  .kbd {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-4);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
    background: var(--paper);
  }

  /* role switcher */
  .role-switcher {
    position: relative;
  }
  .role-btn {
    display: flex; align-items: center; gap: 8px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 10px 4px 4px;
    font-size: 12.5px;
    color: var(--ink);
  }
  .role-btn .avatar { width: 22px; height: 22px; font-size: 11.5px; }
  .role-pop {
    position: absolute; right: 0; top: calc(100% + 8px);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    box-shadow: var(--sh-pop);
    padding: 6px;
    min-width: 240px;
    z-index: 50;
  }
  .role-opt {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 8px;
    cursor: pointer;
  }
  .role-opt:hover { background: rgba(27,23,20,.04); }
  .role-opt .role-name { font-size: 13.5px; }
  .role-opt .role-role {
    font-size: 12.5px; color: var(--ink-4);
    margin-left: auto;
  }

  /* avatar */
  .avatar {
    width: 24px; height: 24px;
    border-radius: 999px;
    background: var(--accent-tint);
    color: var(--accent-2);
    display: inline-grid; place-items: center;
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: .02em;
    flex: none;
  }
  .avatar.lg { width: 32px; height: 32px; font-size: 12.5px; }
  .avatar.xl { width: 44px; height: 44px; font-size: 15px; }
  .avatar.sm { width: 20px; height: 20px; font-size: 11.5px; }
  .avatar.empty {
    background: transparent;
    color: var(--ink-4);
    border: 1px dashed var(--line-strong);
  }
  .avatar-stack { display: inline-flex; }
  .avatar-stack > * + * { margin-left: -6px; box-shadow: 0 0 0 2px var(--card); }

  /* pills */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12.5px;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(27,23,20,.05);
    color: var(--ink-2);
    font-weight: 500;
    letter-spacing: .01em;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .pill.ok      { background: var(--ok-tint);     color: var(--ok); }
  .pill.warn    { background: var(--warn-tint);   color: var(--warn); }
  .pill.danger  { background: var(--danger-tint); color: var(--danger); }
  .pill.client  { background: var(--client-tint); color: var(--client); }
  .pill.accent  { background: var(--accent-tint); color: var(--accent-2); }
  .pill.outline { background: transparent; border-color: var(--line); color: var(--ink-3); }
  .pill .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 8px;
    padding: 6px 11px;
    font-size: 13.5px;
    box-shadow: var(--sh-1);
  }
  .btn:hover { background: var(--card-2); }
  .btn.primary {
    background: var(--ink); color: var(--paper); border-color: var(--ink);
  }
  .btn.primary:hover { background: var(--ink-2); }
  .btn.accent {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .btn.ghost { background: transparent; border-color: transparent; box-shadow: none; }
  .btn.ghost:hover { background: rgba(27,23,20,.05); }
  .btn .icon { width: 14px; height: 14px; }
  .btn.sm { padding: 4px 8px; font-size: 12.5px; }

  /* card */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    box-shadow: var(--sh-1);
  }
  .card.flat { box-shadow: none; }

  /* page headings */
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 18px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  .page-eyebrow {
    font-size: 12.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: .14em;
    margin-bottom: 4px;
  }
  .page-title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 30px;
    letter-spacing: -.02em;
    margin: 0;
    line-height: 1.1;
  }
  .page-title em { color: var(--accent); font-style: italic; }
  .page-sub {
    font-size: 13.5px;
    color: var(--ink-3);
    margin-top: 4px;
    max-width: 60ch;
  }

  /* tabs / chips */
  .chip-row {
    display: inline-flex; gap: 4px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
  }
  .chip {
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--ink-3);
    cursor: pointer;
    user-select: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .chip.active {
    background: var(--ink);
    color: var(--paper);
  }
  .chip .chip-count {
    font-variant-numeric: tabular-nums;
    font-size: 12.5px;
    background: rgba(27,23,20,.05);
    padding: 0 6px;
    border-radius: 999px;
    color: var(--ink-3);
  }
  .chip.active .chip-count {
    background: rgba(255,255,255,.18);
    color: rgba(255,255,255,.85);
  }

  /* tabs underline */
  .tabs {
    display: inline-flex; gap: 2px;
    border-bottom: 1px solid var(--line);
  }
  .tab {
    padding: 8px 14px;
    font-size: 13.5px;
    color: var(--ink-3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
  }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  /* toolbar between page head and content */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .toolbar .sp { flex: 1; }

  /* toast */
  .toast-stack {
    position: fixed;
    bottom: 22px; right: 22px;
    display: flex; flex-direction: column-reverse; gap: 8px;
    z-index: 90;
  }
  .toast {
    background: var(--ink);
    color: var(--paper);
    padding: 9px 14px 9px 12px;
    border-radius: 10px;
    font-size: 12.5px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: var(--sh-pop);
    max-width: 380px;
    animation: toastIn .25s ease-out;
  }
  .toast .toast-icon {
    width: 18px; height: 18px;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    display: grid; place-items: center;
    font-size: 12.5px;
    flex: none;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* utility */
  .row { display: flex; align-items: center; gap: 10px; }
  .col { display: flex; flex-direction: column; }
  .gap-2 { gap: 8px; } .gap-3 { gap: 12px; } .gap-4 { gap: 16px; } .gap-6 { gap: 24px; }
  .mono { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .muted { color: var(--ink-3); }
  .muted-2 { color: var(--ink-4); }
  .hr { height: 1px; background: var(--line); border: 0; margin: 12px 0; }

  /* number block */
  .stat {
    display: flex; flex-direction: column; gap: 6px;
  }
  .stat-label {
    font-size: 12.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: .12em;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-value {
    font-family: var(--serif);
    font-size: 32px;
    font-weight: 500;
    letter-spacing: -.02em;
    line-height: 1;
    color: var(--ink);
  }
  .stat-delta {
    font-size: 12.5px;
    color: var(--ink-3);
    display: flex; align-items: center; gap: 4px;
  }
  .stat-delta.up    { color: var(--ok); }
  .stat-delta.down  { color: var(--danger); }

  /* kanban */
  .kanban {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 260px;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 12px;
  }
  .kanban::-webkit-scrollbar { height: 10px; }
  .kanban::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 999px; }
  .kanban-col {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    display: flex; flex-direction: column;
    min-height: 60px;
    max-height: calc(100vh - 220px);
  }
  .kanban-col.col-client { background: #F2EEE3; border-color: var(--line-strong); }
  .kanban-col.col-designer { background: #F4ECE0; }
  .kanban-col-head {
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 6px;
  }
  .kanban-col-head .stage-num {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-4);
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0 4px;
  }
  .kanban-col-title {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
    flex: 1;
    line-height: 1.2;
  }
  .kanban-col-owner {
    font-size: 11.5px;
    color: var(--ink-3);
    display: flex; align-items: center; gap: 4px;
    margin-top: 2px;
  }
  .kanban-col-count {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-3);
  }
  .kanban-col-body {
    padding: 8px;
    display: flex; flex-direction: column; gap: 8px;
    overflow-y: auto;
    flex: 1;
  }
  .kanban-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    box-shadow: var(--sh-1);
    cursor: grab;
    display: flex; flex-direction: column; gap: 6px;
    transition: box-shadow .15s, transform .15s, border-color .15s;
  }
  .kanban-card:hover { box-shadow: var(--sh-2); border-color: var(--line-strong); }
  .kanban-card:active { cursor: grabbing; }
  .kanban-card.dragging { opacity: .5; }
  .kanban-card.mine { box-shadow: 0 0 0 2px var(--accent), var(--sh-1); border-color: var(--accent); }
  .kanban-card.dim   { opacity: .42; }
  .kanban-card-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.25;
    word-wrap: break-word;
  }
  .kanban-card-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 12.5px; color: var(--ink-3);
  }
  .kanban-card-meta .age {
    font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .age.warm { color: var(--warn); }
  .age.hot  { color: var(--danger); font-weight: 500; }
  .kanban-card-flags {
    display: flex; gap: 4px; flex-wrap: wrap;
  }
  .kanban-card .assign-prompt {
    border: 1px dashed var(--accent);
    color: var(--accent-2);
    background: var(--accent-tint);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 12.5px;
    text-align: center;
  }
  .stage-pill-client {
    background: var(--client-tint);
    color: var(--client);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11.5px;
    font-weight: 500;
  }

  /* table */
  table.t {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13.5px;
  }
  table.t th, table.t td {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-2);
  }
  table.t th {
    font-size: 12.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 500;
    background: var(--card-2);
  }
  table.t tr:hover td { background: var(--card-2); }
  table.t tr:last-child td { border-bottom: none; }

  /* progress / bars */
  .bar {
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .bar > i {
    display: block; height: 100%;
    background: var(--accent);
    border-radius: 999px;
  }
  .bar.ok    > i { background: var(--ok); }
  .bar.warn  > i { background: var(--warn); }
  .bar.danger> i { background: var(--danger); }

  /* misc */
  .divider { height: 1px; background: var(--line); }
  .v-divider { width: 1px; background: var(--line); align-self: stretch; }

  /* drop target */
  .kanban-col.drop {
    background: var(--accent-tint);
    border-color: var(--accent);
  }

  /* side panel */
  .side-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: 460px;
    background: var(--card);
    border-left: 1px solid var(--line);
    box-shadow: -16px 0 40px -16px rgba(27,23,20,.18);
    z-index: 80;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform .22s ease-out;
  }
  .side-panel.open { transform: translateX(0); }
  .side-panel-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
  }
  .side-panel-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .panel-scrim {
    position: fixed; inset: 0;
    background: rgba(27,23,20,.18);
    z-index: 70;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }
  .panel-scrim.open { opacity: 1; pointer-events: auto; }

  /* spark */
  .spark { display: block; }

  /* small section labels */
  .label {
    font-size: 11.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: .14em;
    font-weight: 500;
  }
  .section-title {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 17px;
    letter-spacing: -.01em;
    color: var(--ink);
  }

  /* grid helpers */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  /* dashboard widget */
  .widget {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    padding: 16px;
    box-shadow: var(--sh-1);
  }
  .widget.tinted { background: var(--card-2); }
  .widget-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
  }
  .widget-title {
    font-size: 12.5px;
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .widget-action {
    margin-left: auto;
    font-size: 12.5px;
    color: var(--ink-4);
    cursor: pointer;
  }
  .widget-action:hover { color: var(--ink); }

  /* lists */
  .list-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0;
    border-bottom: 1px dashed var(--line-2);
  }
  .list-row:last-child { border-bottom: 0; }

  /* timeline / log */
  .log-row {
    display: grid;
    grid-template-columns: 22px 1fr auto;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px dashed var(--line-2);
  }
  .log-row:last-child { border-bottom: 0; }
  .log-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 999px;
    margin-top: 6px;
    margin-left: 7px;
  }
  .log-dot.muted { background: var(--ink-4); }

  /* funnel */
  .funnel-row {
    display: grid;
    grid-template-columns: 140px 1fr 80px 60px;
    align-items: center;
    gap: 14px;
    padding: 10px 0;
  }
  .funnel-bar {
    height: 24px;
    background: var(--accent-tint);
    border-radius: 6px;
    position: relative;
  }
  .funnel-bar > i {
    display: block; height: 100%;
    background: var(--accent);
    border-radius: 6px;
  }

  /* dot indicator */
  .dot-ok       { width: 8px; height: 8px; background: var(--ok); border-radius: 999px; }
  .dot-warn     { width: 8px; height: 8px; background: var(--warn); border-radius: 999px; }
  .dot-danger   { width: 8px; height: 8px; background: var(--danger); border-radius: 999px; }
  .dot-accent   { width: 8px; height: 8px; background: var(--accent); border-radius: 999px; }

  /* checkbox */
  .check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line-strong);
    border-radius: 50%;
    background: var(--card);
    cursor: pointer;
    display: inline-grid; place-items: center;
    flex: none;
    transition: background .12s, border-color .12s;
  }
  .check:hover { border-color: var(--ok); }
  .check.done {
    background: var(--ok);
    border-color: var(--ok);
    color: #fff;
  }

  /* design token strip */
  .token-strip {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 14px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 12.5px;
    color: var(--ink-3);
    flex-wrap: wrap;
  }
  .swatch {
    width: 14px; height: 14px;
    border-radius: 4px;
    border: 1px solid rgba(27,23,20,.08);
    display: inline-block;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* segmented */
  .seg {
    display: inline-flex;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 2px;
  }
  .seg button {
    background: transparent; border: none;
    padding: 4px 9px; border-radius: 6px;
    font-size: 12.5px; color: var(--ink-3);
  }
  .seg button.on {
    background: var(--card);
    color: var(--ink);
    box-shadow: var(--sh-1);
  }

  /* svg icon */
  .ic { width: 16px; height: 16px; flex: none; }
  .ic.sm { width: 14px; height: 14px; }
  .ic.lg { width: 20px; height: 20px; }

  /* ─── wider profile + task panels ─── */
  .side-panel.wide { width: 720px; }
  .side-panel.full { width: min(900px, 96vw); }

  .panel-tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--line);
    padding: 0 20px;
    overflow-x: auto;
  }
  .panel-tab {
    padding: 10px 14px;
    font-size: 13.5px;
    color: var(--ink-3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .panel-tab .count {
    font-family: var(--mono);
    font-size: 11.5px;
    background: rgba(27,23,20,.05);
    padding: 0 5px;
    border-radius: 999px;
    color: var(--ink-3);
  }
  .panel-tab:hover { color: var(--ink-2); }
  .panel-tab.active {
    color: var(--ink);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }
  .panel-tab.active .count { background: var(--accent-tint); color: var(--accent-2); }

  /* modal (centered dialog) */
  .modal-scrim {
    position: fixed; inset: 0;
    background: rgba(27,23,20,.32);
    z-index: 95;
    display: grid; place-items: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--sh-pop);
    width: 100%;
    max-width: 640px;
    display: flex; flex-direction: column;
    max-height: calc(100vh - 80px);
  }
  .modal.wide { max-width: 880px; }
  .modal-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: flex-start; gap: 10px;
  }
  .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
  .modal-foot {
    padding: 14px 22px;
    border-top: 1px solid var(--line);
    background: var(--card-2);
    border-radius: 0 0 16px 16px;
    display: flex; align-items: center; gap: 10px;
  }

  /* form controls */
  .field {
    display: flex; flex-direction: column; gap: 5px;
    margin-bottom: 14px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .field-label {
    font-size: 12.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 500;
  }
  .field-hint { font-size: 12.5px; color: var(--ink-4); margin-top: 2px; }
  .input, .textarea, .select-input {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13.5px;
    color: var(--ink);
    outline: none;
    width: 100%;
    font-family: var(--sans);
    transition: border-color .15s, box-shadow .15s;
  }
  .input:focus, .textarea:focus, .select-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-tint);
  }
  .textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
  .input.serif {
    font-family: var(--serif);
    font-size: 19px;
    padding: 6px 0;
    border: none;
    background: transparent;
    letter-spacing: -.01em;
  }
  .input.serif:focus { box-shadow: none; border-bottom: 1px solid var(--accent); border-radius: 0; }
  .input::placeholder, .textarea::placeholder { color: var(--ink-4); }

  /* chips inside form */
  .chip-pick {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card);
    font-size: 12.5px;
    color: var(--ink-3);
    cursor: pointer;
  }
  .chip-pick:hover { border-color: var(--line-strong); color: var(--ink); }
  .chip-pick.on {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .chip-pick.on.accent { background: var(--accent); border-color: var(--accent); }

  /* profile header card */
  .profile-head {
    padding: 18px 20px 16px;
    background: linear-gradient(180deg, var(--card-2) 0%, var(--card) 100%);
    border-bottom: 1px solid var(--line);
  }
  .profile-name {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -.02em;
    line-height: 1.1;
  }
  .profile-meta {
    display: flex; flex-wrap: wrap; gap: 12px;
    font-size: 12.5px; color: var(--ink-3);
    margin-top: 8px;
  }
  .profile-meta span.k { color: var(--ink-4); }
  .profile-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

  /* note card */
  .note-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--accent);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .note-card.cat-meeting       { border-left-color: var(--client); }
  .note-card.cat-weekly        { border-left-color: var(--ok); }
  .note-card.cat-monthly       { border-left-color: var(--accent); }
  .note-card.cat-optimization  { border-left-color: var(--warn); }
  .note-card.cat-internal      { border-left-color: var(--ink-3); }
  .note-card-head {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 4px;
  }
  .note-card-title {
    font-size: 13.5px;
    font-weight: 500;
    flex: 1;
  }
  .note-card-body {
    font-size: 13.5px;
    color: var(--ink-2);
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .note-card-foot {
    font-size: 12.5px;
    color: var(--ink-4);
    margin-top: 8px;
  }

  /* file row */
  .file-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: var(--card);
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .file-kind {
    width: 32px; height: 36px;
    background: var(--card-2);
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    flex: none;
  }
  .file-kind.pdf { background: #FBEFEE; color: #B0432E; border-color: #ECD2CC; }
  .file-kind.zip { background: #F1ECDF; color: #8A6B2C; border-color: #DAD0B7; }
  .file-kind.xlsx { background: #E3F0E7; color: #2F7A57; border-color: #C9DFD0; }
  .file-kind.csv  { background: #E3F0E7; color: #2F7A57; border-color: #C9DFD0; }
  .file-kind.doc  { background: #E4ECF6; color: #4E6FAE; border-color: #CFD9E8; }
  .file-kind.link { background: var(--accent-tint); color: var(--accent-2); border-color: var(--accent-tint-2); }

  /* task list row (clickable) */
  .task-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    border-bottom: 1px dashed var(--line-2);
    cursor: pointer;
    transition: background .12s;
  }
  .task-row:hover { background: var(--card-2); }
  .task-row .check { cursor: pointer; }

  /* checklist item */
  .checkitem {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--line-2);
  }
  .checkitem:last-child { border-bottom: 0; }
  .checkitem span.txt {
    flex: 1; font-size: 13.5px;
  }
  .checkitem span.txt.done {
    color: var(--ink-4);
    text-decoration: line-through;
  }

  /* link list */
  .link-row {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 12.5px;
  }
  .link-row a { color: var(--accent); text-decoration: none; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .link-row a:hover { text-decoration: underline; }

  /* comment item */
  .comment-row {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--line-2);
  }
  .comment-row:last-child { border-bottom: 0; }
  .comment-bubble {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13.5px;
    line-height: 1.5;
  }

  /* sub-card (for profile inner sections) */
  .sub-card {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .sub-card-title {
    font-size: 12.5px;
    color: var(--ink-4);
    text-transform: uppercase;
    letter-spacing: .12em;
    font-weight: 500;
    margin-bottom: 8px;
  }

  /* tag list */
  .tag {
    display: inline-block;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 12.5px;
    color: var(--ink-2);
    margin-right: 5px;
    margin-bottom: 5px;
  }
  .tag.avoid { background: var(--danger-tint); color: var(--danger); border-color: transparent; }

  /* ─── Content Studio ─── */
  .studio-grid {
    display: grid;
    grid-template-columns: 200px repeat(var(--studio-cols, 4), 1fr);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    background: var(--card);
    overflow: hidden;
  }
  .studio-grid > .h, .studio-grid > .c, .studio-grid > .r {
    border-bottom: 1px solid var(--line-2);
    border-right: 1px solid var(--line-2);
    padding: 10px 12px;
    min-width: 0;
  }
  .studio-grid > .h {
    background: var(--card-2);
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-4);
    font-weight: 500;
  }
  .studio-grid > .r {
    background: var(--card);
    display: flex; flex-direction: column; gap: 4px;
    justify-content: center;
  }
  .studio-grid > .c {
    cursor: pointer;
    transition: background .12s;
  }
  .studio-grid > .c:hover { background: var(--card-2); }
  .studio-grid > .c.empty { background: repeating-linear-gradient(45deg, var(--card) 0 6px, var(--paper) 6px 12px); cursor: default; }

  .plan-cell {
    display: flex; flex-direction: column; gap: 6px;
    min-height: 78px;
  }
  .plan-cell .stage {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.25;
  }
  .plan-cell .progress-row {
    display: flex; align-items: center; gap: 8px;
    margin-top: auto;
  }
  .plan-cell .progress-row .bar {
    flex: 1; height: 4px;
  }
  .plan-cell .progress-row .pct {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-3);
    min-width: 32px;
    text-align: right;
  }

  /* Deliverable rows in plan panel */
  .deliv-row {
    display: grid;
    grid-template-columns: 32px 1fr 110px 90px 110px 28px;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    border-bottom: 1px dashed var(--line-2);
    transition: background .12s;
  }
  .deliv-row:hover { background: var(--card-2); }
  .deliv-icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    display: grid; place-items: center;
    background: var(--card-2);
    border: 1px solid var(--line);
    font-size: 12.5px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .deliv-icon.reel   { background: #F4EAF1; color: #9F4677; border-color: #E6D2DD; }
  .deliv-icon.static { background: #E4ECF6; color: #4E6FAE; border-color: #CFD9E8; }
  .deliv-status-select {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 12.5px;
    color: var(--ink-2);
  }

  /* Calendar */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0;
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    overflow: hidden;
    background: var(--card);
  }
  .cal-grid .dow {
    background: var(--card-2);
    padding: 8px 10px;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-4);
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
  }
  .cal-day {
    min-height: 90px;
    padding: 6px 8px;
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
    display: flex; flex-direction: column; gap: 3px;
    background: var(--card);
  }
  .cal-day.muted { background: var(--paper); }
  .cal-day .num {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--ink-4);
  }
  .cal-day.today .num { color: var(--accent); font-weight: 600; }
  .cal-pill {
    display: flex; align-items: center; gap: 4px;
    background: var(--card-2);
    border-left: 2px solid var(--accent);
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 11.5px;
    color: var(--ink-2);
    line-height: 1.25;
    cursor: pointer;
  }
  .cal-pill.reel   { border-left-color: #9F4677; }
  .cal-pill.static { border-left-color: #4E6FAE; }
  .cal-pill.posted   { opacity: .55; }
  .cal-pill.scheduled { background: var(--ok-tint); }

  /* All-clients heatmap rows */
  .heatmap {
    display: grid;
    grid-template-columns: 170px repeat(31, 1fr);
    gap: 0;
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    overflow: hidden;
    background: var(--card);
  }
  .heatmap > .hh {
    background: var(--card-2);
    font-size: 11.5px;
    color: var(--ink-4);
    text-align: center;
    padding: 6px 0;
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
    font-family: var(--mono);
  }
  .heatmap > .hr {
    background: var(--card);
    padding: 8px 10px;
    font-size: 12.5px;
    color: var(--ink);
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
    display: flex; align-items: center; gap: 6px;
  }
  .heatmap > .hd {
    border-right: 1px solid var(--line-2);
    border-bottom: 1px solid var(--line-2);
    min-height: 32px;
    display: grid; place-items: center;
  }
  .heatmap .dot-r {
    width: 8px; height: 8px; border-radius: 999px;
    background: #9F4677;
  }
  .heatmap .dot-s {
    width: 8px; height: 8px; border-radius: 2px;
    background: #4E6FAE;
  }
  .heatmap .dot-r.posted, .heatmap .dot-s.posted { opacity: .35; }
  .heatmap .dot-r.scheduled, .heatmap .dot-s.scheduled { box-shadow: 0 0 0 2px var(--ok-tint); }

  /* Plan-status pill (8 stages) — use compact dot+label */
  .plan-pill {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px;
    padding: 1px 7px;
    border-radius: 999px;
    background: rgba(27,23,20,.05);
    color: var(--ink-2);
  }
  .plan-pill .d { width: 6px; height: 6px; border-radius: 999px; }

  /* command bar / search empty */
  .empty {
    border: 1px dashed var(--line-strong);
    border-radius: 10px;
    padding: 18px;
    text-align: center;
    color: var(--ink-4);
    background: var(--card-2);
  }

  /* ─── AI Assistant ──────────────────────────────────────── */
  .ai-bubble {
    position: fixed;
    right: 22px;
    bottom: 22px;
    width: 52px; height: 52px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--paper);
    display: grid; place-items: center;
    border: none;
    box-shadow: 0 10px 24px -8px rgba(27,23,20,.35), 0 2px 6px rgba(27,23,20,.12);
    z-index: 60;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .ai-bubble:hover { transform: translateY(-2px); box-shadow: 0 14px 32px -8px rgba(27,23,20,.4); }
  .ai-bubble .ic { width: 22px; height: 22px; color: var(--accent); }
  .ai-bubble .dot {
    position: absolute;
    top: 6px; right: 6px;
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--accent);
    box-shadow: 0 0 0 2px var(--ink);
  }
  .ai-bubble.open { background: var(--accent); }
  .ai-bubble.open .ic { color: #fff; }

  /* assistant panel reuses .side-panel — small additions */
  .ai-panel-head {
    padding: 12px 16px 12px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, var(--card-2) 0%, var(--card) 100%);
  }
  .ai-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--ink);
    color: var(--accent);
    display: grid; place-items: center;
  }
  .ai-mark .ic { width: 16px; height: 16px; }
  .ai-title-block { display: flex; flex-direction: column; line-height: 1.15; }
  .ai-title { font-family: var(--serif); font-size: 15px; font-weight: 500; letter-spacing: -.01em; }
  .ai-title em { color: var(--accent); font-style: italic; }
  .ai-sub { font-size: 12.5px; color: var(--ink-4); }

  .ai-context-chip {
    display: inline-flex; align-items: center; gap: 5px;
    margin-left: auto;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px 9px;
    font-size: 12.5px;
    color: var(--ink-3);
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ai-context-chip .d { width: 6px; height: 6px; border-radius: 999px; background: var(--accent); flex: none; }

  .ai-msgs {
    flex: 1;
    overflow-y: auto;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 12px;
    background: var(--paper);
  }
  .ai-msg { display: flex; gap: 9px; max-width: 100%; }
  .ai-msg .who-mark {
    width: 26px; height: 26px;
    border-radius: 999px;
    display: grid; place-items: center;
    flex: none;
    font-size: 11.5px;
    font-weight: 600;
  }
  .ai-msg.user .who-mark {
    background: var(--accent-tint);
    color: var(--accent-2);
  }
  .ai-msg.assistant .who-mark {
    background: var(--ink);
    color: var(--accent);
  }
  .ai-msg.assistant .who-mark .ic { width: 14px; height: 14px; }
  .ai-bubble-text {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 13px;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--ink);
    box-shadow: var(--sh-1);
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    max-width: calc(100% - 36px);
  }
  .ai-bubble-text strong { font-weight: 600; }
  .ai-bubble-text code {
    font-family: var(--mono);
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 0 4px;
    font-size: 12.5px;
  }
  .ai-bubble-text ul, .ai-bubble-text ol {
    margin: 4px 0;
    padding-left: 18px;
  }
  .ai-bubble-text li { margin: 2px 0; }
  .ai-bubble-text h2, .ai-bubble-text h3 {
    font-family: var(--serif);
    font-weight: 500;
    margin: 6px 0 4px;
    letter-spacing: -.01em;
  }
  .ai-bubble-text h2 { font-size: 15px; }
  .ai-bubble-text h3 { font-size: 15px; color: var(--ink-2); }

  .ai-msg.user .ai-bubble-text {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .ai-msg.user .ai-bubble-text code {
    background: rgba(255,255,255,.1);
    border-color: rgba(255,255,255,.15);
    color: var(--paper);
  }

  .ai-typing {
    display: inline-flex; gap: 4px;
    padding: 12px 14px;
  }
  .ai-typing span {
    width: 6px; height: 6px;
    background: var(--ink-4);
    border-radius: 999px;
    animation: aiPulse 1.2s infinite ease-in-out;
  }
  .ai-typing span:nth-child(2) { animation-delay: .2s; }
  .ai-typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes aiPulse {
    0%, 80%, 100% { opacity: .25; transform: scale(.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  .ai-suggest-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ai-suggest {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    color: var(--ink-2);
    font-size: 12.5px;
    line-height: 1.4;
    transition: border-color .15s, background .15s;
    display: flex; align-items: flex-start; gap: 8px;
  }
  .ai-suggest:hover { border-color: var(--accent); background: var(--card-2); }
  .ai-suggest .ic { width: 14px; height: 14px; color: var(--accent); flex: none; margin-top: 2px; }
  .ai-suggest .lbl { flex: 1; }
  .ai-suggest .kbd-hint {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-4);
  }

  .ai-empty {
    text-align: center;
    padding: 8px 4px 14px;
  }
  .ai-empty .ai-empty-mark {
    width: 44px; height: 44px;
    background: var(--ink);
    color: var(--accent);
    border-radius: 12px;
    display: inline-grid; place-items: center;
    margin-bottom: 10px;
  }
  .ai-empty .ai-empty-mark .ic { width: 22px; height: 22px; }
  .ai-empty h3 {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 17px;
    letter-spacing: -.01em;
    margin: 0 0 4px;
  }
  .ai-empty p {
    font-size: 12.5px;
    color: var(--ink-3);
    margin: 0 0 14px;
  }

  .ai-composer {
    padding: 12px;
    border-top: 1px solid var(--line);
    background: var(--card);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ai-composer-row {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px 10px;
    transition: border-color .15s, box-shadow .15s;
  }
  .ai-composer-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-tint);
  }
  .ai-composer-row textarea {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    resize: none;
    font-family: var(--sans);
    font-size: 13.5px;
    line-height: 1.5;
    color: var(--ink);
    max-height: 160px;
    min-height: 22px;
  }
  .ai-composer-row textarea::placeholder { color: var(--ink-4); }
  .ai-send {
    border: none;
    background: var(--ink);
    color: var(--paper);
    width: 30px; height: 30px;
    border-radius: 8px;
    display: grid; place-items: center;
    cursor: pointer;
    flex: none;
  }
  .ai-send:disabled { background: var(--ink-4); cursor: not-allowed; }
  .ai-send:not(:disabled):hover { background: var(--accent); }
  .ai-send .ic { width: 14px; height: 14px; }
  .ai-composer-hint {
    font-size: 11.5px;
    color: var(--ink-4);
    display: flex; align-items: center; gap: 8px;
  }
  .ai-composer-hint .ai-quick-chip {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 1px 7px;
    font-size: 11.5px;
    color: var(--ink-3);
    cursor: pointer;
  }
  .ai-composer-hint .ai-quick-chip:hover { border-color: var(--accent); color: var(--accent-2); }

  /* full-page assistant layout */
  .ai-screen {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 18px;
    height: calc(100vh - 56px - 60px);
    min-height: 540px;
  }
  .ai-screen-main {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    box-shadow: var(--sh-1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .ai-context-card {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .ai-context-card-title {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-4);
    font-weight: 500;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .ai-context-card-title .ic { width: 12px; height: 12px; }
  .ai-context-row {
    display: flex; justify-content: space-between;
    font-size: 12.5px;
    color: var(--ink-2);
    padding: 3px 0;
  }
  .ai-context-row .k { color: var(--ink-4); }

  /* assistant nav item highlight */
  .nav-item.ai-nav .icon { color: var(--accent); }
  .nav-item.ai-nav { font-weight: 500; }

  /* ─── My Day ───────────────────────────────────────────── */
  .myday-strip {
    display: grid;
    grid-template-columns: repeat(4, minmax(150px, 1fr)) 2fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .myday-stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 4px;
    box-shadow: var(--sh-1);
  }
  .myday-stat-ic {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--card-2);
    color: var(--ink-3);
    display: grid; place-items: center;
  }
  .myday-stat-ic .ic { width: 12px; height: 12px; }
  .myday-stat-v {
    font-family: var(--serif);
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
    margin-top: 2px;
    letter-spacing: -.01em;
  }
  .myday-firstup {
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    box-shadow: var(--sh-1);
  }
  .myday-firstup-label {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--accent);
    display: flex; align-items: center; gap: 6px;
  }
  .myday-firstup-label .ic { width: 12px; height: 12px; }
  .myday-firstup-text {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    line-height: 1.25;
    letter-spacing: -.01em;
  }
  .myday-firstup .btn {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .myday-firstup .btn:hover { background: var(--accent-2); }

  .myday-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .myday-lane {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    padding: 14px 14px 16px;
    box-shadow: var(--sh-1);
    min-height: 240px;
  }
  .myday-lane-head { display: flex; align-items: flex-start; }
  .myday-lane-eyebrow {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-4);
    font-weight: 500;
  }
  .myday-lane-title {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -.01em;
    line-height: 1;
    margin-top: 2px;
  }

  /* meeting block */
  .myday-mtg {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card-2);
    cursor: pointer;
    transition: border-color .15s;
  }
  .myday-mtg:hover { border-color: var(--accent); }
  .myday-mtg-time {
    font-size: 13.5px;
    color: var(--ink-2);
    width: 44px;
    flex: none;
  }
  .myday-mtg-bar {
    width: 3px;
    height: 26px;
    border-radius: 999px;
    background: var(--ink-3);
    flex: none;
  }
  .myday-mtg-bar.client   { background: var(--client); }
  .myday-mtg-bar.sales    { background: var(--accent); }
  .myday-mtg-bar.review   { background: var(--warn); }
  .myday-mtg-bar.internal { background: var(--ink-3); }

  /* focus hint */
  .myday-focus {
    background: var(--accent-tint);
    color: var(--accent-2);
    border: 1px dashed var(--accent);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 12.5px;
    line-height: 1.4;
    display: flex; align-items: center; gap: 8px;
    margin: 4px 0;
  }
  .myday-focus .ic { width: 13px; height: 13px; flex: none; }

  /* task row in lane */
  .myday-task {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .myday-task:hover { border-color: var(--accent); background: var(--card-2); }
  .myday-task-pri {
    width: 3px;
    height: 22px;
    border-radius: 999px;
    flex: none;
  }
  .myday-task-pri.pri-high { background: var(--danger); }
  .myday-task-pri.pri-med  { background: var(--warn); }
  .myday-task-pri.pri-low  { background: var(--ink-4); }

  /* bottom row — watchlist + capacity */
  .myday-bottom {
    display: grid;
    grid-template-columns: 1.7fr 1fr;
    gap: 12px;
  }
  .myday-risk {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px;
    border-bottom: 1px dashed var(--line-2);
    cursor: pointer;
    transition: background .15s;
  }
  .myday-risk:last-child { border-bottom: none; }
  .myday-risk:hover { background: var(--card-2); }
  .myday-risk-dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--ink-4);
    flex: none;
  }
  .myday-risk-dot.warn   { background: var(--warn); }
  .myday-risk-dot.danger { background: var(--danger); }
  .myday-risk-dot.client { background: var(--client); }

  @media (max-width: 1100px) {
    .myday-strip { grid-template-columns: repeat(2, 1fr); }
    .myday-firstup { grid-column: 1 / -1; }
    .myday-grid { grid-template-columns: 1fr; }
    .myday-bottom { grid-template-columns: 1fr; }
  }

  /* ─── Client Bible: Vault ───────────────────────────────── */
  .vault-intro {
    display: flex; gap: 12px; align-items: center;
    padding: 12px 14px;
    background: var(--ink);
    color: var(--paper);
    border-radius: 12px;
    margin-bottom: 4px;
  }
  .vault-intro-mark {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    display: grid; place-items: center;
    flex: none;
  }
  .vault-intro-mark .ic { width: 18px; height: 18px; }
  .vault-intro div:last-child { color: var(--paper); }
  .vault-intro div:last-child div:last-child { color: rgba(247,244,238,.7); }

  .vault-row {
    display: grid;
    grid-template-columns: minmax(180px, 1.1fr) 2.2fr minmax(160px, 1fr);
    gap: 14px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    align-items: flex-start;
    transition: border-color .15s;
  }
  .vault-row:hover { border-color: var(--ink-3); }
  .vault-row.vault-expiring { border-left: 3px solid var(--warn); }
  .vault-row.vault-revoked  { opacity: .55; border-left: 3px solid var(--danger); }

  .vault-platform { display: flex; gap: 10px; align-items: flex-start; min-width: 0; }
  .vault-kind {
    width: 38px; height: 38px;
    border-radius: 8px;
    background: var(--card-2);
    color: var(--ink-3);
    border: 1px solid var(--line);
    display: grid; place-items: center;
    font-family: var(--mono);
    font-size: 11.5px;
    font-weight: 600;
    flex: none;
  }
  .vault-kind.k-login       { background: var(--accent-tint); color: var(--accent-2); border-color: var(--accent-tint-2); }
  .vault-kind.k-token       { background: var(--client-tint); color: var(--client); border-color: #CFD9E8; }
  .vault-kind.k-service-key { background: var(--ok-tint);     color: var(--ok);     border-color: #C9DFD0; }
  .vault-kind.k-mcc         { background: var(--warn-tint);   color: var(--warn);   border-color: #E8D7B4; }

  .vault-label { font-size: 13.5px; font-weight: 500; }
  .vault-sublabel { font-size: 12.5px; color: var(--ink-3); }

  .vault-fields { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .vault-field {
    display: flex; align-items: center; gap: 8px;
    font-size: 12.5px;
    color: var(--ink-2);
  }
  .vault-field .k {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-4);
    width: 64px;
    flex: none;
  }
  .vault-secret {
    font-family: var(--mono);
    font-size: 13.5px;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--card-2);
    border: 1px solid var(--line);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .vault-secret.shown { color: var(--ink); background: var(--accent-tint); border-color: var(--accent); }
  .vault-secret.hidden { color: var(--ink-4); letter-spacing: 1px; }

  .vault-reveal {
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12.5px;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    flex: none;
  }
  .vault-reveal:hover { background: var(--accent); }
  .vault-reveal .ic { width: 11px; height: 11px; }

  .vault-icon-btn {
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    width: 22px; height: 22px;
    display: grid; place-items: center;
    cursor: pointer;
    color: var(--ink-3);
  }
  .vault-icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .vault-icon-btn .ic { width: 11px; height: 11px; }

  .vault-note {
    font-size: 12.5px;
    color: var(--ink-3);
    background: var(--card-2);
    border-radius: 6px;
    padding: 6px 8px;
    line-height: 1.45;
  }

  .vault-meta {
    display: flex; flex-direction: column; gap: 4px;
    align-items: flex-end;
    flex: none;
  }

  /* Audit log rows */
  .audit-row {
    display: flex; gap: 10px; align-items: center;
    padding: 10px 14px;
    border-bottom: 1px dashed var(--line-2);
  }
  .audit-row:last-child { border-bottom: none; }
  .audit-dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    flex: none;
    background: var(--ink-3);
  }
  .audit-dot.a-reveal { background: var(--accent); }
  .audit-dot.a-rotate { background: var(--warn); }
  .audit-dot.a-create { background: var(--ok); }

  /* ─── Client Bible: Drive ───────────────────────────────── */
  .drive-root {
    padding: 10px 14px;
    background: var(--card-2);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .drive-root-ic {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: #1F8A5B;
    color: #fff;
    display: grid; place-items: center;
    flex: none;
  }
  .drive-root-ic .ic { width: 16px; height: 16px; }

  .drive-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .drive-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: border-color .15s, transform .15s;
    display: flex; flex-direction: column;
    min-height: 130px;
  }
  .drive-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .drive-card.add {
    align-items: center; justify-content: center;
    background: var(--card-2);
    border: 1px dashed var(--line-strong);
    gap: 4px;
    flex-direction: column;
  }
  .drive-card.add:hover { border-color: var(--accent); }
  .drive-card-head { display: flex; gap: 10px; align-items: flex-start; }
  .drive-card-ic {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--ok-tint);
    color: var(--ok);
    display: grid; place-items: center;
    flex: none;
  }
  .drive-card-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
  }
  .drive-highlights {
    list-style: none;
    padding: 0; margin: 8px 0 6px;
    font-size: 12.5px;
    color: var(--ink-3);
  }
  .drive-highlights li {
    padding: 2px 0;
    padding-left: 12px;
    position: relative;
  }
  .drive-highlights li:before {
    content: "·";
    position: absolute; left: 4px;
    color: var(--ink-4);
  }
  .drive-card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px dashed var(--line-2);
  }

  /* ─── Client Bible: Transcripts ─────────────────────────── */
  .transcript-strip {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 10px;
  }
  .spinner {
    width: 12px; height: 12px;
    border-radius: 999px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    display: inline-block;
    animation: spin .9s linear infinite;
    margin-right: 4px;
    vertical-align: -2px;
  }
  .spinner.big { width: 16px; height: 16px; border-width: 2.5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pull-progress {
    display: flex; align-items: center; gap: 10px;
    padding: 14px;
    background: var(--accent-tint);
    color: var(--accent-2);
    border: 1px dashed var(--accent);
    border-radius: 10px;
    margin-bottom: 10px;
  }
  .transcript-split {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 12px;
    align-items: flex-start;
  }
  .transcript-list {
    display: flex; flex-direction: column; gap: 4px;
  }
  .transcript-item {
    display: flex; gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .transcript-item:hover { border-color: var(--ink-3); }
  .transcript-item.active {
    border-color: var(--accent);
    background: var(--accent-tint);
  }
  .transcript-title {
    font-size: 13.5px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .transcript-meta { font-size: 12.5px; color: var(--ink-3); }

  .transcript-detail { min-width: 0; }
  .transcript-detail-head {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 4px 0 12px;
    border-bottom: 1px solid var(--line-2);
    margin-bottom: 12px;
  }
  .transcript-excerpt {
    font-family: var(--sans);
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--ink-2);
    background: var(--card-2);
    border-radius: 8px;
    padding: 10px 12px;
    margin: 0;
    white-space: pre-wrap;
    max-height: 200px;
    overflow: hidden;
    position: relative;
  }
  .transcript-excerpt:not(.full):after {
    content: "";
    position: absolute;
    inset: auto 0 0 0;
    height: 50px;
    background: linear-gradient(to bottom, transparent, var(--card-2));
    pointer-events: none;
  }
  .transcript-excerpt.full { max-height: none; }

  .action-item {
    display: flex; gap: 10px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--line-2);
    align-items: flex-start;
  }
  .action-item:last-child { border-bottom: none; }
  .key-moment {
    display: flex; gap: 12px;
    padding: 4px 0;
    align-items: center;
  }

  @media (max-width: 800px) {
    .vault-row { grid-template-columns: 1fr; }
    .drive-grid { grid-template-columns: 1fr; }
    .transcript-split { grid-template-columns: 1fr; }
  }

  /* ─── Scenarios ─────────────────────────────────────────── */
  .scenario-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }
  .scenario-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    padding: 18px 18px 14px;
    cursor: pointer;
    transition: border-color .15s, transform .15s, box-shadow .15s;
    display: flex; flex-direction: column;
    box-shadow: var(--sh-1);
    min-height: 170px;
  }
  .scenario-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--sh-2);
  }
  .scenario-card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .scenario-card-num {
    font-size: 12.5px;
    color: var(--ink-4);
    letter-spacing: .12em;
  }
  .scenario-card-title {
    font-family: var(--serif);
    font-size: 19px;
    font-weight: 500;
    letter-spacing: -.015em;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .scenario-card-sub {
    font-size: 12.5px;
    color: var(--ink-3);
    line-height: 1.5;
    flex: 1;
  }
  .scenario-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--line-2);
  }

  /* timeline */
  .scenario-timeline {
    display: flex; flex-direction: column;
    margin-top: 4px;
  }
  .scenario-beat {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 12px;
    min-height: 56px;
  }
  .scenario-beat-rail {
    display: flex; flex-direction: column;
    align-items: center;
    padding-top: 10px;
    position: relative;
  }
  .scenario-beat-day {
    font-size: 11.5px;
    color: var(--ink-4);
    margin-bottom: 4px;
  }
  .scenario-beat-dot {
    width: 12px; height: 12px;
    border-radius: 999px;
    background: var(--ink-3);
    border: 2px solid var(--card);
    box-shadow: 0 0 0 1px var(--line);
    z-index: 1;
  }
  .scenario-beat-line {
    width: 2px;
    flex: 1;
    background: var(--line);
    margin-top: 2px;
  }
  .scenario-beat-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 10px;
    box-shadow: var(--sh-1);
  }
  .scenario-beat-kind {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .1em;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid;
    background: transparent;
  }

  /* ─── Auto-rules screen ─────────────────────────────────── */
  .autorules-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 14px;
  }
  .autorules-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .autorule-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    padding: 16px 16px 12px;
    box-shadow: var(--sh-1);
    display: flex; flex-direction: column;
  }
  .autorule-head {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 10px;
  }
  .autorule-ic {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--ink);
    color: var(--accent);
    display: grid; place-items: center;
    flex: none;
  }
  .autorule-ic .ic { width: 17px; height: 17px; }
  .autorule-name {
    font-family: var(--serif);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -.01em;
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .autorule-body {
    background: var(--card-2);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .autorule-field {
    display: flex; gap: 10px; align-items: center;
    padding: 3px 0;
    font-size: 12.5px;
  }
  .autorule-field .k {
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--ink-4);
    width: 78px;
    flex: none;
  }
  .autorule-field .v { color: var(--ink-2); }
  .autorule-field .v.mono { font-size: 12.5px; }
  .autorule-divider {
    border-top: 1px dashed var(--line-2);
    margin: 4px -4px 10px;
  }
  .autorule-list-title {
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--ink-4);
    font-weight: 500;
    margin-bottom: 6px;
  }
  .autorule-list { display: flex; flex-direction: column; gap: 6px; }
  .autorule-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .autorule-row:hover { border-color: var(--accent); background: var(--card-2); }
  .autorule-row.sev-danger { border-left: 3px solid var(--danger); }
  .autorule-row.sev-warn   { border-left: 3px solid var(--warn); }
  .autorule-dot {
    width: 7px; height: 7px; border-radius: 999px; flex: none;
    background: var(--ink-3);
  }
  .autorule-dot.sev-danger { background: var(--danger); }
  .autorule-dot.sev-warn   { background: var(--warn); }
  .autorule-target {
    font-size: 13.5px; font-weight: 500;
  }
  .autorule-evidence {
    font-size: 12.5px;
    color: var(--ink-3);
    line-height: 1.45;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .autorule-empty {
    font-size: 12.5px;
    color: var(--ink-4);
    font-style: italic;
    padding: 6px 4px;
  }

  @media (max-width: 1100px) {
    .autorules-strip { grid-template-columns: repeat(2, 1fr); }
    .autorules-grid  { grid-template-columns: 1fr; }
  }

  /* ─── Phase 3 ──────────────────────────────────────────── */

  /* spinner inverts on dark-buttons */
  .btn.primary .spinner,
  .btn.accent  .spinner,
  .ai-send .spinner { color: var(--paper); }

  /* responsive: collapse sidebar to a top strip + stack My Day lanes
     + size profile/task panel to full width on phones. */
  @media (max-width: 900px) {
    .app {
      grid-template-columns: 1fr;
    }
    .sidebar {
      position: relative;
      height: auto;
      max-height: 56vh;
      overflow-y: auto;
      border-right: 0;
      border-bottom: 1px solid var(--line);
      padding: 12px 12px 16px;
    }
    .content { padding: 16px 14px 60px; }
    .topbar { padding: 0 14px; height: 52px; gap: 10px; }
    .topbar-search { display: none; }
    .breadcrumb { font-size: 12.5px; }
    .page-head {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    .page-title { font-size: 22px; }
    .page-sub   { font-size: 12.5px; }
    /* general 2/3/4-col grids collapse */
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    /* My Day */
    .myday-strip { grid-template-columns: 1fr 1fr; }
    .myday-firstup { grid-column: 1 / -1; grid-template-columns: 1fr; row-gap: 8px; }
    .myday-grid  { grid-template-columns: 1fr; }
    .myday-bottom { grid-template-columns: 1fr; }
    /* Auto-rules */
    .autorules-strip { grid-template-columns: 1fr 1fr; }
    .autorules-grid  { grid-template-columns: 1fr; }
    .autorule-head .autorule-name { font-size: 15px; }
    .autorule-field { font-size: 12.5px; }
    .autorule-field .k { width: 64px; font-size: 11.5px; }
    /* ClientProfilePanel + TaskDetailPanel + AssistantPanel */
    .side-panel,
    .side-panel.wide,
    .side-panel.full {
      width: 100vw;
    }
    .profile-head { padding: 14px 16px 12px; }
    .profile-name { font-size: 22px; }
    .profile-meta { gap: 8px; font-size: 12.5px; }
    .panel-tabs { padding: 0 12px; }
    .panel-tab { padding: 9px 10px; font-size: 12.5px; }
    /* Commission / Concentration / Performance / Forecast — make tables scroll-x */
    table.t { font-size: 12.5px; }
    table.t th, table.t td { padding: 8px 10px; }
    .widget { padding: 12px; }
    .widget.tinted { padding: 12px; }
    .kanban { grid-auto-columns: 240px; }
    /* Compose email modal */
    .modal.wide { max-width: 100%; }
    .field-row, .field-row-3 { grid-template-columns: 1fr; }
    /* Toasts shouldn't crowd a phone */
    .toast-stack { right: 12px; bottom: 12px; }
    /* AI bubble shifts slightly so it doesn't overlap content scroll */
    .ai-bubble { right: 14px; bottom: 14px; width: 46px; height: 46px; }
    /* topbar role switcher — collapse to avatar only */
    .role-btn .col { display: none; }
    .role-btn { padding: 3px 4px; }
  }
  @media (max-width: 600px) {
    .myday-strip { grid-template-columns: 1fr; }
    .autorules-strip { grid-template-columns: 1fr; }
    .chip-row { flex-wrap: wrap; }
    .page-title { font-size: 22px; }
    .stat-value { font-size: 26px; }
  }

  /* Phase 3: tables wrap into scroll-x containers cleanly */
  .widget > table.t { display: table; width: 100%; }
  .widget { overflow-x: auto; }
  /* Lorenz/SVG charts shrink to container */
  .widget svg { max-width: 100%; height: auto; }

  /* Concentration bar row hover */
  .row:hover > .bar > i { filter: brightness(1.04); }

  /* ─── Phase 4 — Sales (Abhishek's console) ──────────────────── */

  /* small caps eyebrow used inside sales cards */
  .s4-eyebrow {
    font-size: 11.5px; letter-spacing: .14em;
    color: var(--ink-3); text-transform: uppercase;
    font-weight: 500;
  }

  /* sample tag (dashed, warm) */
  .pill.s4-sample {
    background: #FDF7E1;
    border: 1px dashed #C9B870;
    color: #7d5a11;
  }
  .pill.s4-sample .dot { background: #B98426; }

  /* communication tile icon */
  .s4-comm-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--card-2);
    border: 1px solid var(--line);
    display: grid; place-items: center;
    color: var(--ink-2);
  }
  .s4-comm-icon .ic { width: 14px; height: 14px; }

  /* 5-column KPI grid (Phase 4 specific — the 4-grid already exists) */
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  @media (max-width: 1200px) { .grid-5 { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 900px)  { .grid-5 { grid-template-columns: repeat(2, 1fr); } }

  /* counter strip — used by Calls and Emails screens */
  .s4-counter-strip {
    display: flex; align-items: stretch; gap: 0;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    overflow: hidden;
    box-shadow: var(--sh-1);
  }
  .s4-counter-cell {
    flex: 1;
    padding: 12px 16px;
    border-right: 1px solid var(--line-2);
  }
  .s4-counter-cell:last-child { border-right: 0; }
  .s4-counter-label {
    font-size: 11.5px; letter-spacing: .13em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 500;
  }
  .s4-counter-value {
    font-family: var(--mono); font-size: 22px; font-weight: 500;
    color: var(--ink); margin-top: 4px;
  }
  .s4-counter-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }

  /* sales tables (used in Leads + Calls screens) */
  .s4-table { width: 100%; border-collapse: collapse; }
  .s4-table thead th {
    text-align: left;
    font-size: 11.5px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 500;
    padding: 12px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--card-2);
  }
  .s4-table tbody td {
    padding: 13px 14px;
    border-bottom: 1px solid var(--line-2);
    font-size: 13.5px;
    vertical-align: middle;
  }
  .s4-table tbody tr { cursor: pointer; transition: background .1s; }
  .s4-table tbody tr:hover { background: var(--card-2); }
  .s4-table tbody tr:last-child td { border-bottom: 0; }

  /* call-type chip */
  .s4-call-type {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: inline-grid; place-items: center;
    color: #fff;
  }
  .s4-call-type .ic { width: 12px; height: 12px; stroke-width: 2; }
  .s4-call-type.s4-call-out   { background: var(--ok); }
  .s4-call-type.s4-call-in    { background: var(--client); }
  .s4-call-type.s4-call-miss  { background: var(--danger); }
  .s4-call-type.s4-call-sched { background: var(--ink-3); }

  /* sales pipeline kanban — 12 columns at 240px */
  .s4-kanban {
    grid-auto-columns: 240px;
  }
  .s4-kanban .kanban-col.s4-col-warn .kanban-col-head { background: var(--warn-tint); }
  .s4-kanban .kanban-col.s4-col-danger .kanban-col-head { background: var(--danger-tint); }
  .s4-kanban .kanban-col.s4-col-ok .kanban-col-head { background: var(--ok-tint); }

  /* fee chip on deal cards */
  .s4-fee {
    font-family: var(--mono);
    font-size: 12.5px;
    background: var(--warn-tint);
    border: 1px dashed #d4b067;
    border-radius: 7px;
    padding: 4px 8px;
    color: #7d5a11;
    cursor: text;
    display: inline-flex; align-items: center;
  }
  .s4-fee.set {
    background: var(--accent-tint);
    border: 1px solid var(--accent);
    border-style: solid;
    color: var(--accent-2);
  }

  /* banner inside sales screens */
  .s4-banner {
    border: 1px solid var(--line);
    border-radius: var(--r-2);
    padding: 10px 13px;
    font-size: 12.5px;
    display: flex; align-items: center; gap: 10px;
    background: var(--card);
  }
  .s4-banner .ic { width: 16px; height: 16px; flex-shrink: 0; }
  .s4-banner.warn   { background: var(--warn-tint);   border-color: transparent; color: #7a5613; }
  .s4-banner.danger { background: var(--danger-tint); border-color: transparent; color: #7d2a18; }
  .s4-banner.info   { background: #DEE5F2;            border-color: transparent; color: #2f4778; }

  /* sales history timeline */
  .s4-tl-item {
    display: grid;
    grid-template-columns: 28px 1fr;
    gap: 12px;
    padding: 12px 0;
    align-items: flex-start;
  }
  .s4-tl-item + .s4-tl-item { border-top: 1px solid var(--line-2); }
  .s4-tl-icon {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: grid; place-items: center;
    background: var(--card-2);
    border: 1px solid var(--line);
    color: var(--ink-2);
    flex-shrink: 0;
  }
  .s4-tl-icon .ic { width: 13px; height: 13px; }
  .s4-tl-icon.call      { background: var(--ok-tint);     color: #1e5a3e; border-color: transparent; }
  .s4-tl-icon.miss      { background: var(--danger-tint); color: #7d2a18; border-color: transparent; }
  .s4-tl-icon.sched     { background: #DEE5F2;            color: #2f4778; border-color: transparent; }
  .s4-tl-icon.wa        { background: #DCF8C6;            color: #075E54; border-color: transparent; }
  .s4-tl-icon.stage     { background: var(--accent-tint); color: var(--accent-2); border-color: transparent; }
  .s4-tl-icon.meet      { background: #EFE2F5;            color: #5a3673; border-color: transparent; }
  .s4-tl-icon.email-out { background: var(--ok-tint);     color: #1e5a3e; border-color: transparent; }
  .s4-tl-icon.email-in  { background: #FCEFD9;            color: #7a5613; border-color: transparent; }
  .s4-tl-kind { font-size: 12.5px; font-weight: 500; color: var(--ink); }
  .s4-tl-time { font-size: 12.5px; color: var(--ink-3); font-family: var(--mono); }
  .s4-tl-body { font-size: 13.5px; color: var(--ink-2); margin-top: 4px; line-height: 1.5; }

  /* whatsapp bubbles inside the timeline */
  .s4-wa-thread {
    background: #E5DDD2;
    padding: 10px 10px;
    border-radius: 10px;
    margin-top: 8px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .s4-wa-bubble {
    background: #DCF8C6;
    border-radius: 8px 8px 8px 2px;
    padding: 7px 9px 5px;
    max-width: 80%;
    font-size: 12.5px;
    align-self: flex-start;
    box-shadow: 0 1px 1px rgba(0,0,0,.05);
    word-wrap: break-word;
  }
  .s4-wa-bubble.out {
    background: #FFFFFF;
    border-radius: 8px 8px 2px 8px;
    align-self: flex-end;
  }
  .s4-wa-time { font-size: 11.5px; color: #6b6b6b; font-family: var(--mono); text-align: right; margin-top: 1px; }

  /* email inbox row */
  .s4-email-row {
    display: grid;
    grid-template-columns: 40px 1fr 90px;
    gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--line-2);
    cursor: pointer;
    transition: background .12s;
    align-items: flex-start;
  }
  .s4-email-row:last-child { border-bottom: 0; }
  .s4-email-row:hover { background: var(--card-2); }
  .s4-email-row.unread { background: rgba(197,85,45,.04); }
  .s4-email-side { display: flex; align-items: flex-start; justify-content: center; padding-top: 2px; }
  .s4-email-dir {
    width: 28px; height: 28px; border-radius: 8px;
    display: grid; place-items: center;
    color: #fff;
  }
  .s4-email-dir.out { background: var(--ok); }
  .s4-email-dir.in  { background: var(--client); }
  .s4-email-dir .ic { width: 13px; height: 13px; stroke-width: 2; }
  .s4-email-main { min-width: 0; }
  .s4-email-subject {
    font-size: 13.5px;
    color: var(--ink);
    margin-top: 2px;
    font-weight: 400;
  }
  .s4-email-subject.unread { font-weight: 600; }
  .s4-email-snippet {
    font-size: 12.5px;
    color: var(--ink-3);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.5;
  }
  .s4-email-time {
    text-align: right;
    font-size: 12.5px;
    color: var(--ink-2);
    padding-top: 2px;
    line-height: 1.4;
  }

  /* responsive — sales bits */
  @media (max-width: 900px) {
    .s4-counter-strip { flex-wrap: wrap; }
    .s4-counter-cell { min-width: 50%; }
    .s4-email-row { grid-template-columns: 32px 1fr; }
    .s4-email-time { grid-column: 1 / -1; text-align: left; padding-left: 44px; padding-top: 6px; }
  }

  /* ─── Phase 6 — Tasks (quick-add · duration board · timer · activity) ─── */
  .t6-qa { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-2); padding: 8px 10px; margin-bottom: 14px; transition: border-color .15s, box-shadow .15s; }
  .t6-qa.focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
  .t6-qa-input-row { display: flex; align-items: center; gap: 8px; }
  .t6-qa-plus { width: 22px; height: 22px; border-radius: 999px; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 16px; line-height: 1; flex-shrink: 0; }
  .t6-qa-field { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .t6-qa-input { width: 100%; border: 0; outline: 0; background: transparent; font-family: var(--sans); font-size: 14px; color: var(--ink); padding: 4px 0; }
  .t6-qa-input::placeholder { color: var(--ink-4); }
  .t6-qa-preview { font-size: 12px; line-height: 1.4; color: var(--ink-3); margin-top: 2px; white-space: pre-wrap; }
  .t6-qa-preview .t6-seg { color: var(--ink-4); }
  .t6-qa-preview .t6-seg-on { color: var(--accent-2); background: var(--accent-tint); border-radius: 4px; padding: 0 2px; }
  .t6-qa-chips { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; padding-left: 30px; }
  .t6-qa-hint { font-size: 11.5px; color: var(--ink-4); width: 100%; margin-top: 6px; }
  /* quick-add: Ramble button + shared widget zone */
  .t6-qa-ramblebtn { display: inline-flex; align-items: center; gap: 5px; font-size: 12.5px; font-weight: 500; border: 1px solid var(--line); background: var(--card); color: var(--accent-2); border-radius: 999px; padding: 5px 12px; cursor: pointer; white-space: nowrap; }
  .t6-qa-ramblebtn:hover, .t6-qa-ramblebtn.on { border-color: var(--accent); background: var(--accent-tint); }
  .t6-qa-zone { padding-left: 30px; }
  .t6-qa-zone .t6-nt-fieldrow { margin: 10px 0 2px; }
  .t6-qa-ramble { padding: 2px; }
  /* "Wispr format" reference link + popover */
  .t6-wf { position: relative; display: inline-flex; margin-left: 8px; }
